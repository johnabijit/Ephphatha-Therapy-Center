<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ephphatha Admin</title>

    <!-- Identity -->
    <script src="https://unpkg.com/netlify-identity-widget@1.9.2/build/netlify-identity-widget.js"></script>

    <!-- ✅ NEW CMS -->
    <script src="https://unpkg.com/netlify-cms-app@latest/dist/netlify-cms-app.js"></script>
  </head>

  <body>
    <div id="nc-root"></div>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
